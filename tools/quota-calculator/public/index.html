<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Quota Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-50 text-slate-900">
    <div class="max-w-4xl mx-auto p-6">
        <h1 class="text-2xl font-semibold mb-4">Quota Calculator (GCP)</h1>
        <div id="controls" class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="p-4 bg-white rounded shadow">
                <label class="block text-sm font-medium">Replicas</label>
                <input id="replicas" type="range" min="1" max="200" value="3" class="w-full" />
                <div class="flex justify-between text-xs text-slate-500"><span
                        id="replicas-val">3</span><span>1-200</span></div>

                <label class="block text-sm font-medium mt-4">CPU per pod (vCPU)</label>
                <input id="cpuPerPod" type="range" min="0.1" max="4" step="0.1" value="0.5" class="w-full" />
                <div class="flex justify-between text-xs text-slate-500"><span
                        id="cpuPerPod-val">0.5</span><span>vCPU</span></div>

                <label class="block text-sm font-medium mt-4">Memory per pod (GB)</label>
                <input id="memPerPodGb" type="range" min="0.1" max="64" step="0.1" value="0.5" class="w-full" />
                <div class="flex justify-between text-xs text-slate-500"><span
                        id="memPerPodGb-val">0.5</span><span>GB</span></div>
            </div>

            <div class="p-4 bg-white rounded shadow">
                <label class="block text-sm font-medium">Initial storage (GB)</label>
                <input id="initialStorageGb" type="number" value="100" class="w-full p-2 border rounded" />

                <label class="block text-sm font-medium mt-3">Monthly growth (%)</label>
                <input id="monthlyGrowthPercent" type="range" min="0" max="50" value="5" class="w-full" />
                <div class="flex justify-between text-xs text-slate-500"><span
                        id="monthlyGrowthPercent-val">5%</span><span>0-50%</span></div>

                <label class="block text-sm font-medium mt-3">Monitoring RPS</label>
                <input id="rps" type="number" value="10" class="w-full p-2 border rounded" />
                <label class="block text-sm font-medium mt-3">Avg response (KB)</label>
                <input id="avgResponseKb" type="number" value="50" class="w-full p-2 border rounded" />
            </div>
        </div>

        <div class="mt-6 p-4 bg-white rounded shadow">
            <h2 class="font-medium">Results</h2>
            <pre id="results" class="mt-2 text-sm bg-slate-100 p-3 rounded h-64 overflow-auto"></pre>
        </div>
    </div>

    <script type="module" src="./app.mjs"></script>
</body>

</html>
