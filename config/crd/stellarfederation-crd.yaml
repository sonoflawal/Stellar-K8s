apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: starlarfederations.stellar.org
spec:
  group: stellar.org
  names:
    kind: StellarFederation
    plural: stellarfederations
    shortNames:
      - sfed
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - clusters
                - replication
                - trafficRouting
              properties:
                clusters:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      region:
                        type: string
                      apiEndpoint:
                        type: string
                      kubeconfigSecretRef:
                        type: string
                      weight:
                        type: integer
                        default: 100
                replication:
                  type: object
                  properties:
                    enabled:
                      type: boolean
                    mode:
                      type: string
                      enum: [Asynchronous, Synchronous]
                    replicationLagThresholdSecs:
                      type: integer
                trafficRouting:
                  type: object
                  properties:
                    strategy:
                      type: string
                      enum: [Geographic, RoundRobin, LeastConnections]
                    healthCheckTimeoutSecs:
                      type: integer
                healthCheckIntervalSecs:
                  type: integer
                  default: 30
                failoverDetectionSecs:
                  type: integer
                  default: 30
            status:
              type: object
              properties:
                phase:
                  type: string
                activeRegions:
                  type: array
                  items:
                    type: string
                failedRegions:
                  type: array
                  items:
                    type: string
                lastSyncTime:
                  type: string
                replicationLagMs:
                  type: integer
