apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: stellarautoscalers.stellar.org
spec:
  group: stellar.org
  names:
    kind: StellarAutoscaler
    plural: stellarautoscalers
    shortNames:
      - sas
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - targetNode
                - policy
                - customMetrics
              properties:
                targetNode:
                  type: string
                policy:
                  type: object
                  properties:
                    name:
                      type: string
                    minReplicas:
                      type: integer
                    maxReplicas:
                      type: integer
                    strategy:
                      type: string
                      enum: [Aggressive, Balanced, Conservative, Custom]
                customMetrics:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      metricType:
                        type: string
                        enum: [TransactionThroughput, LedgerLag, RpcQueueDepth, ContractInvocations, HistoryArchiveBacklog]
                      threshold:
                        type: number
                predictiveScaling:
                  type: object
                  properties:
                    enabled:
                      type: boolean
                    predictionWindowMins:
                      type: integer
                    modelType:
                      type: string
                      enum: [Prophet, LinearRegression, Arima]
                costAware:
                  type: object
                  properties:
                    enabled:
                      type: boolean
                    budgetPerMonthUsd:
                      type: number
                    preferSpotInstances:
                      type: boolean
            status:
              type: object
              properties:
                phase:
                  type: string
                currentReplicas:
                  type: integer
                desiredReplicas:
                  type: integer
                lastScalingTime:
                  type: string
                predictedLoad:
                  type: number
                costOptimizationApplied:
                  type: boolean
