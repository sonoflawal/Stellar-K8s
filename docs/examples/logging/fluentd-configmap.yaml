apiVersion: v1
kind: ConfigMap
metadata:
  name: fluentd-config
  namespace: logging
data:
  fluent.conf: |
    <source>
      @type tail
      path /var/log/containers/*.log
      pos_file /var/log/fluentd-containers.log.pos
      tag kubernetes.*
      format cri
      read_from_head true
    </source>

    <filter kubernetes.**>
      @type kubernetes_metadata
    </filter>

    <filter kubernetes.**>
      @type parser
      key_name message
      reserve_data true
      <parse>
        @type regexp
        expression /(?<time>\d{4}-\d{2}-\d{2}T\S+) (?<level>\w+) (?<msg>.*)/
      </parse>
    </filter>

    <match **>
      @type elasticsearch
      host elasticsearch
      port 9200
      logstash_format true
      include_tag_key true
      type_name _doc
    </match>
