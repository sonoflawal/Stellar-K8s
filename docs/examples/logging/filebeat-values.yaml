filebeatConfig:
  filebeat.yml: |
    filebeat.autodiscover:
      providers:
        - type: kubernetes
          hints.enabled: true

    filebeat.inputs:
      - type: container
        paths:
          - /var/log/containers/*.log

    processors:
      - add_kubernetes_metadata: {}
      - decode_json_fields:
          fields: ["message"]
          target: "json"

    output.elasticsearch:
      hosts: ["http://elasticsearch:9200"]
      index: "filebeat-%{+yyyy.MM.dd}"
