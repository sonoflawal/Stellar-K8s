          echo "✅ Experiment 10 PASSED (recovery: ${RECOVERY}s)"

      - name: Upload Group C results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chaos-results-group-c-${{ github.run_id }}
          path: /tmp/chaos-results/
          retention-days: 7

      - name: Collect cluster logs
        if: always()
        uses: ./.github/actions/collect-e2e-logs
        with:
          operator-namespace: ${{ env.OPERATOR_NS }}
          artifact-name: chaos-cluster-logs-group-c-${{ github.run_id }}
          extra-namespaces: ${{ env.CHAOS_NS }}

  # ── Report: merge all results and generate resilience report ─────────────
  report:
    name: Generate Resilience Report
    runs-on: ubuntu-latest
    needs: [chaos-group-a, chaos-group-b, chaos-group-c]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download Group A results
        uses: actions/download-artifact@v4
        with:
          name: chaos-results-group-a-${{ github.run_id }}
          path: /tmp/chaos-results/
        continue-on-error: true

      - name: Download Group B results
        uses: actions/download-artifact@v4
        with:
          name: chaos-results-group-b-${{ github.run_id }}
          path: /tmp/chaos-results/
        continue-on-error: true

      - name: Download Group C results
        uses: actions/download-artifact@v4
        with:
          name: chaos-results-group-c-${{ github.run_id }}
          path: /tmp/chaos-results/
        continue-on-error: true

      - name: Generate resilience report
        id: report
        run: |
          python3 tests/chaos/generate_report.py \
            --results-dir /tmp/chaos-results \
            --output-format both \
            --run-id "${{ github.run_id }}" \
            --github-summary "$GITHUB_STEP_SUMMARY" \
            || true
          # Extract score for badge
          SCORE=$(python3 -c "
          import json, sys
          try:
              d = json.load(open('/tmp/chaos-results/resilience-report.json'))
              print(f\"{d['overall_score']:.1f}\")
          except Exception:
              print('N/A')
          ")
          echo "score=$SCORE" >> "$GITHUB_OUTPUT"

      - name: Upload resilience report
        uses: actions/upload-artifact@v4
        with:
          name: chaos-resilience-report-${{ github.run_id }}
          path: |
            /tmp/chaos-results/resilience-report.md
            /tmp/chaos-results/resilience-report.json
          retention-days: 90

      - name: Write job summary
        if: always()
        run: |
          GA="${{ needs.chaos-group-a.result }}"
          GB="${{ needs.chaos-group-b.result }}"
          GC="${{ needs.chaos-group-c.result }}"
          SCORE="${{ steps.report.outputs.score }}"
          {
            echo ""
            echo "## 🔥 Chaos Engineering — Run Summary"
            echo ""
            echo "| Group | Experiments | Status |"
            echo "|-------|-------------|--------|"
            echo "| A — Kill & Network | 01 Pod Kill, 02 Network Partition | \`${GA}\` |"
            echo "| B — Latency & Disk | 03 API Latency, 04 Peer Partition, 05 Disk Fill | \`${GB}\` |"
            echo "| C — Resource & Cascading | 06 CPU Stress, 07 Memory, 08 Validator Kill, 09 Cascading, 10 I/O | \`${GC}\` |"
            echo ""
            echo "**Overall Resilience Score:** ${SCORE}/100"
            echo "**Commit:** \`${{ github.sha }}\`"
            echo "**Triggered by:** ${{ github.event_name }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail if any group failed
        if: |
          needs.chaos-group-a.result == 'failure' ||
          needs.chaos-group-b.result == 'failure' ||
          needs.chaos-group-c.result == 'failure'
        run: |
          echo "One or more chaos experiment groups failed."
          exit 1
