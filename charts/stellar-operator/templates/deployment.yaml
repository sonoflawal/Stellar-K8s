apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "stellar-operator.fullname" . }}
  labels:
    {{- include "stellar-operator.labels" . | nindent 4 }}
  {{- with .Values.extraAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "stellar-operator.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        {{- toYaml .Values.podAnnotations | nindent 8 }}
        {{- with .Values.extraAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "stellar-operator.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "stellar-operator.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      volumes:
        - name: operator-config
          configMap:
            name: {{ include "stellar-operator.fullname" . }}-config
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: STELLAR_OPERATOR_CONFIG
              value: /etc/stellar-operator/config.yaml
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            # Leader election environment variables
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            {{- if .Values.otel.enabled }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.otel.endpoint | quote }}
            - name: OTEL_SERVICE_NAME
              value: "stellar-operator"
            - name: OTEL_TRACES_SAMPLER
              value: "parentbased_traceidratio"
            - name: OTEL_TRACES_SAMPLER_ARG
              value: {{ .Values.otel.samplingRatio | quote }}
            {{- end }}
          volumeMounts:
            - name: operator-config
              mountPath: /etc/stellar-operator
              readOnly: true
          args:
            - --log-level={{ .Values.operator.logLevel }}
            {{- if .Values.operator.restApiEnabled }}
            - --enable-rest-api
            - --rest-api-port={{ .Values.operator.restApiPort }}
            {{- end }}
            - --metrics-port={{ .Values.operator.metricsPort }}
            {{- if .Values.operator.watchNamespace }}
            - --watch-namespace={{ .Values.operator.watchNamespace }}
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.operator.restApiPort }}
              protocol: TCP
            - name: metrics
              containerPort: {{ .Values.operator.metricsPort }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /livez
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 24
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
        {{- if .Values.sidecar.enabled }}
        - name: crash-analyzer
          image: "{{ .Values.sidecar.image.repository | default .Values.image.repository }}:{{ .Values.sidecar.image.tag | default .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.sidecar.image.pullPolicy | default .Values.image.pullPolicy }}
          command: ["/stellar-sidecar"]
          env:
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: CONTAINER_NAME
              value: {{ .Chart.Name }}
            - name: RUST_LOG
              value: {{ .Values.operator.logLevel }}
          resources:
            {{- toYaml .Values.sidecar.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
        {{- end }}
        {{- if .Values.forkDetector.enabled }}
        - name: fork-detector
          image: "{{ .Values.forkDetector.image.repository | default .Values.image.repository }}:{{ .Values.forkDetector.image.tag | default .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.forkDetector.image.pullPolicy | default .Values.image.pullPolicy }}
          command: ["/stellar-fork-detector"]
          env:
            - name: FORK_DETECTOR_LOCAL_ENDPOINT
              value: {{ .Values.forkDetector.localEndpoint | quote }}
            - name: FORK_DETECTOR_ANCHORS
              value: {{ join "," .Values.forkDetector.anchors | quote }}
            - name: FORK_DETECTOR_POLL_INTERVAL
              value: {{ .Values.forkDetector.pollIntervalSecs | quote }}
            - name: FORK_DETECTOR_DIVERGENCE_THRESHOLD
              value: {{ .Values.forkDetector.divergenceThreshold | quote }}
            - name: FORK_DETECTOR_METRICS_BIND
              value: "0.0.0.0:{{ .Values.forkDetector.metricsPort }}"
            - name: FORK_DETECTOR_NETWORK
              value: {{ .Values.operator.watchNamespace | default "mainnet" | quote }}
            - name: FORK_DETECTOR_NODE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: RUST_LOG
              value: {{ .Values.operator.logLevel }}
          ports:
            - name: fork-metrics
              containerPort: {{ .Values.forkDetector.metricsPort }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: fork-metrics
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /readyz
              port: fork-metrics
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            {{- toYaml .Values.forkDetector.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.arch }}
      {{- if not .Values.nodeSelector }}
      nodeSelector:
      {{- end }}
        kubernetes.io/arch: {{ .Values.arch }}
      {{- end }}
      {{- if .Values.affinity }}
      affinity:
        {{- toYaml .Values.affinity | nindent 8 }}
      {{- else if gt .Values.replicaCount 1.0 }}
      # Default anti-affinity for leader election HA: spread replicas across nodes
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/name
                      operator: In
                      values:
                        - {{ include "stellar-operator.name" . }}
                    - key: app.kubernetes.io/instance
                      operator: In
                      values:
                        - {{ .Release.Name }}
                topologyKey: kubernetes.io/hostname
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.arch }}
      {{- if not .Values.tolerations }}
      tolerations:
      {{- end }}
        - key: "kubernetes.io/arch"
          operator: "Equal"
          value: {{ .Values.arch }}
          effect: "NoSchedule"
      {{- end }}
